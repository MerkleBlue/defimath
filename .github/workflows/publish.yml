name: Publish to npm

# Trigger: a SemVer tag is pushed (e.g. v3.2.0).
# Local release flow:
#   npm version patch | minor | major          # 3.1.0 -> 3.1.1 etc., commits + tags
#   git push --follow-tags
on:
  push:
    tags:
      - 'v*.*.*'

# `id-token: write` is required for npm provenance (the green "verified" badge
# on the package page). `contents: read` is the default checkout permission.
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npx hardhat test

      - name: Verify tag matches package.json
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG=$(node -p "require('./package.json').version")
          echo "Tag:          v$TAG"
          echo "package.json: $PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match package.json version $PKG"
            exit 1
          fi

      - name: Publish
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
