name: Publish to npm

on:
  workflow_run:
    workflows: ["Hardhat Tests"]
    types: [completed]
    branches: [master]

jobs:
  publish:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install

      - name: Publish if version changed
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          NPM_VERSION=$(npm view "$PKG_NAME" version 2>/dev/null || echo "0.0.0")
          echo "Local: $PKG_VERSION  /  npm: $NPM_VERSION"
          if [ "$PKG_VERSION" != "$NPM_VERSION" ]; then
            echo "Publishing $PKG_NAME@$PKG_VERSION"
            npm publish --access public
          else
            echo "Version $PKG_VERSION already published, skipping."
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
